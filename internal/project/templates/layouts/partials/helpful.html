{{/*
  Visual chrome for the "Was this page helpful?" widget.
  Buttons are intentionally disabled in Slice B; the submission
  flow lands with godoc issue #2 (support + analytics plumbing).
*/}}
<aside class="helpful" aria-label="Page feedback">
  <p class="helpful__prompt">Was this page helpful?</p>
  <div class="helpful__actions">
    <button class="helpful__btn" type="button" disabled aria-disabled="true"
            title="Feedback submission ships with godoc #2 (support + analytics)">Yes</button>
    <button class="helpful__btn" type="button" disabled aria-disabled="true"
            title="Feedback submission ships with godoc #2 (support + analytics)">No</button>
  </div>
  <small class="helpful__note">Feedback collection ships with godoc #2.</small>
</aside>
